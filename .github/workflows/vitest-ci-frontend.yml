# .github/workflows/vitest-frontend-ci.yml
name: vitest-frontend-ci

on:
  push: 
    paths:
      - "frontend/**"
  #   branches:
  #     - dev
  # pull_request:
  #   branches:
  #     - main
  #     - dev
        # paths:
        #     - "frontend/**" # Déclenchement automatique, uniquement lors d'un push et uniquement sur dans le dossier frontend

jobs:
    test-front:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.x]

        steps:
          - name: Checkout code
            uses: actions/checkout@v4
    
          - name: Use Node.js ${{ matrix.node-version }}
            uses: actions/setup-node@v4
            with:
                # cache-dependency-path: subdir/package-lock.json
                cache-dependency-path: frontend/package-lock.json
                node-version: ${{ matrix.node-version }}
                cache: 'npm'
            
          - name: Install dependencies
            working-directory: frontend
            run: npm install && npx playwright install
        
          - name: Run tests
            working-directory: frontend
            run: npm test

    docker-front:
      needs: test-front
      if: github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      steps:
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        - name: Set up QEMU
          uses: docker/setup-qemu-action@v3
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3
        - name: Build and push
          uses: docker/build-push-action@v5
          with:
            push: true
            context: "{{defaultContext}}:frontend"
            file: build.Dockerfile
            tags: ${{ vars.DOCKERHUB_USERNAME }}/final-project-study-frontend:latest
            build-args: |
              VITE_PUBLIC_API_LINK=${{ secrets.VITE_PUBLIC_API_LINK }}