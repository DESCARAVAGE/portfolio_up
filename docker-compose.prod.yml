services:
  backend:
    image: descaravage/final-project-study-backend
    env_file: .env.backend
    depends_on:
      - db
    # backend doit gérer sa propre attente de la DB (retries/wait-for)

  frontend:
    image: descaravage/final-project-study-frontend

  db:
    image: postgres:16
    restart: always
    env_file: .env.db
    volumes:
      - ./dbData/:/var/lib/postgresql/data/customDataFolder
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d db_portfolio -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.28.2
    depends_on:
      - frontend
      - backend
    restart: always
    ports:
      - 8000:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./logs:/var/log/nginx
