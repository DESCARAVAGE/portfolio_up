services:
  backend:
    image: descaravage/final-project-study-backend:latest
    pull_policy: always
    env_file: .env.backend
    depends_on:
      - db
    # backend doit gérer sa propre attente de la DB (retries/wait-for)

  frontend:
    image: descaravage/final-project-study-frontend:latest
    pull_policy: always
    env_file: .env.frontend
    depends_on:
      - backend

  db:
    image: postgres:16
    restart: always
    env_file: .env.db
    volumes:
      - $HOME/postgres-data/:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d db_portfolio -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.28.2
    depends_on:
      - frontend
      - backend
    restart: always
    ports:
      - ${GATEWAY_PORT:-8000}:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./logs:/var/log/nginx
